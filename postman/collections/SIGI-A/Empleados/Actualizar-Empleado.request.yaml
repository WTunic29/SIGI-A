$kind: http-request
name: Actualizar Empleado
description: Actualiza los datos de un empleado existente. Estado permitido activo o inactivo. Requiere autenticación JWT.
method: PUT
url: '{{base_url}}/empleados/{{id_empleado}}'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "nombre": "María",
      "apellido": "González",
      "telefono": "3112345678",
      "email": "maria@salon.com",
      "especialidad": "Colorimetría y Corte",
      "estado": "activo"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Empleado actualizado", () => pm.response.to.have.status(200));
      pm.test("Respuesta tiene campo empleado", () => pm.expect(pm.response.json()).to.have.property("empleado"));
      const empleado = pm.response.json().empleado;
      if (empleado) {
        pm.test("Empleado tiene id", () => pm.expect(empleado).to.have.property("id"));
        pm.test("Empleado tiene nombre", () => pm.expect(empleado).to.have.property("nombre"));
        pm.test("Estado es válido", () => pm.expect(empleado.estado).to.be.oneOf(["activo", "inactivo"]));
      }