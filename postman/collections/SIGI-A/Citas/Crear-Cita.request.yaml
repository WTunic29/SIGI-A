$kind: http-request
name: Crear Cita
description: Crea una nueva cita para un cliente en un negocio. Estado inicial debe ser 'pendiente'. fecha en formato DATE (YYYY-MM-DD), hora_inicio y hora_fin en formato TIME (HH:MM:SS). Requiere autenticación JWT.
method: POST
url: '{{base_url}}/citas'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "id_cliente": {{id_usuario}},
      "id_negocio": {{id_negocio}},
      "id_empleado": {{id_empleado}},
      "fecha": "2025-08-01",
      "hora_inicio": "10:00:00",
      "hora_fin": "10:45:00",
      "estado": "pendiente",
      "observaciones": "Primera visita"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 201 - Cita creada", () => pm.response.to.have.status(201));
      pm.test("Respuesta tiene campo cita", () => pm.expect(pm.response.json()).to.have.property("cita"));
      const cita = pm.response.json().cita;
      if (cita) {
        pm.test("Cita tiene id", () => pm.expect(cita).to.have.property("id"));
        pm.test("Cita tiene id_cliente", () => pm.expect(cita).to.have.property("id_cliente"));
        pm.test("Cita tiene id_negocio", () => pm.expect(cita).to.have.property("id_negocio"));
        pm.test("Cita tiene id_empleado", () => pm.expect(cita).to.have.property("id_empleado"));
        pm.test("Cita tiene fecha", () => pm.expect(cita).to.have.property("fecha"));
        pm.test("Cita tiene hora_inicio", () => pm.expect(cita).to.have.property("hora_inicio"));
        pm.test("Cita tiene hora_fin", () => pm.expect(cita).to.have.property("hora_fin"));
        pm.test("Estado es válido", () => pm.expect(cita.estado).to.be.oneOf(["pendiente", "confirmada", "cancelada", "completada", "no_asistio"]));
        pm.environment.set("id_cita", cita.id);
      }