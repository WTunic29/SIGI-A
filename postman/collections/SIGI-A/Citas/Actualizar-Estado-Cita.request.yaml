$kind: http-request
name: Actualizar Estado de Cita
description: 'Actualiza el estado de una cita. Estados válidos: pendiente, confirmada, cancelada, completada, no_asistio. Requiere autenticación JWT.'
method: PUT
url: '{{base_url}}/citas/{{id_cita}}/estado'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "estado": "confirmada"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Estado actualizado", () => pm.response.to.have.status(200));
      pm.test("Respuesta tiene campo cita", () => pm.expect(pm.response.json()).to.have.property("cita"));
      const cita = pm.response.json().cita;
      if (cita) {
        pm.test("Cita tiene id", () => pm.expect(cita).to.have.property("id"));
        pm.test("Estado es válido", () => pm.expect(cita.estado).to.be.oneOf(["pendiente", "confirmada", "cancelada", "completada", "no_asistio"]));
      }