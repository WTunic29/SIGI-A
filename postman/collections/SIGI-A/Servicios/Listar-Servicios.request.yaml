$kind: http-request
name: Listar Servicios del Negocio
description: Obtiene todos los servicios de un negocio específico. Requiere autenticación JWT.
method: GET
url: '{{base_url}}/negocios/{{id_negocio}}/servicios'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Lista obtenida", () => pm.response.to.have.status(200));
      pm.test("Respuesta es un array", () => pm.expect(pm.response.json()).to.be.an("array"));
      const servicios = pm.response.json();
      if (servicios.length > 0) {
        const s = servicios[0];
        pm.test("Servicio tiene id", () => pm.expect(s).to.have.property("id"));
        pm.test("Servicio tiene nombre", () => pm.expect(s).to.have.property("nombre"));
        pm.test("Servicio tiene id_negocio", () => pm.expect(s).to.have.property("id_negocio"));
        pm.test("duracion_minutos es mayor a 0", () => pm.expect(s.duracion_minutos).to.be.above(0));
        pm.test("precio es mayor o igual a 0", () => pm.expect(s.precio).to.be.at.least(0));
        pm.test("Estado es válido", () => pm.expect(s.estado).to.be.oneOf(["activo", "inactivo"]));
      }