$kind: http-request
name: Eliminar Servicio
description: Elimina un servicio existente por su ID. Requiere autenticación JWT.
method: DELETE
url: '{{base_url}}/servicios/{{id_servicio}}'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 o 204 - Servicio eliminado", () => pm.expect(pm.response.code).to.be.oneOf([200, 204]));
      if (pm.response.code === 200) {
        pm.test("Respuesta tiene mensaje de confirmación", () => pm.expect(pm.response.json()).to.have.property("mensaje"));
      }