$kind: http-request
name: 'Actualizar servicio'
description: |-
  Placeholder de borrador para modificar la definición de un servicio existente.

  La ruta y el payload son una propuesta basada en el dominio, no un endpoint validado.
method: PUT
url: '{{base_url}}{{api_prefix}}{{api_version}}/servicios/{{servicio_id}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{auth_token}}'
body:
  type: json
  content: |-
    {
      "nombre": "Corte premium actualizado",
      "precio": "40000",
      "duracion": "75"
    }
