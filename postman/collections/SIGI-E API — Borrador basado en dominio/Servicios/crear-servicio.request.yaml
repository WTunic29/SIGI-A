$kind: http-request
name: 'Crear servicio'
description: |-
  Placeholder de borrador para registrar un servicio en un negocio.

  El request se deriva de la entidad servicios y de sus atributos principales en el esquema.
  No representa un endpoint implementado ni verificado.
method: POST
url: '{{base_url}}{{api_prefix}}{{api_version}}/negocios/{{negocio_id}}/servicios'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{auth_token}}'
body:
  type: json
  content: |-
    {
      "nombre": "Corte premium",
      "precio": "35000",
      "duracion": "60",
      "negocio_id": "{{negocio_id}}"
    }
