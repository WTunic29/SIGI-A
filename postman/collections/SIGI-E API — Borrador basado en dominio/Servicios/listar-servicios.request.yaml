$kind: http-request
name: 'Listar servicios'
description: |-
  Placeholder de borrador para obtener el catálogo de servicios de un negocio.

  Este request se basa en la entidad servicios y su relación con negocios.
  No corresponde a un endpoint implementado verificado.
method: GET
url: '{{base_url}}{{api_prefix}}{{api_version}}/negocios/{{negocio_id}}/servicios'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
