$kind: http-request
name: 'Actualizar negocio'
description: |-
  Placeholder de borrador para modificar los datos de un negocio existente.

  La estructura propuesta parte del dominio y del esquema relacional.
  No corresponde a un endpoint implementado verificado.
method: PUT
url: '{{base_url}}{{api_prefix}}{{api_version}}/negocios/{{negocio_id}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{auth_token}}'
body:
  type: json
  content: |-
    {
      "nombre": "Barbería Central Renovada",
      "direccion": "Nueva dirección de prueba",
      "telefono": "+57 3111111111"
    }
