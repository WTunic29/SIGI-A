$kind: http-request
name: 'Crear negocio'
description: |-
  Placeholder de borrador para registrar un negocio dentro de la plataforma.

  El request se infiere de la entidad negocios y de la relación con usuarios.
  No representa un endpoint implementado ni validado.
method: POST
url: '{{base_url}}{{api_prefix}}{{api_version}}/negocios'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{auth_token}}'
body:
  type: json
  content: |-
    {
      "nombre": "Barbería Central",
      "direccion": "Calle Principal 123",
      "telefono": "+57 3000000000",
      "usuario_id": "{{usuario_id}}"
    }
