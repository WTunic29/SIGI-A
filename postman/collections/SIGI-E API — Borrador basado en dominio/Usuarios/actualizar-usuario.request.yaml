$kind: http-request
name: 'Actualizar usuario'
description: |-
  Placeholder de borrador para actualizar datos de un usuario existente.

  La ruta y el payload son estimaciones basadas en el dominio y no han sido verificados contra una implementación real.
method: PUT
url: '{{base_url}}{{api_prefix}}{{api_version}}/usuarios/{{usuario_id}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{auth_token}}'
body:
  type: json
  content: |-
    {
      "nombre": "Usuario actualizado",
      "rol": "{{rol_usuario}}"
    }
