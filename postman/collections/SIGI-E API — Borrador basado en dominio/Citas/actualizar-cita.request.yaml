$kind: http-request
name: 'Actualizar cita'
description: |-
  Placeholder de borrador para modificar la programación o el estado de una cita.

  La forma del request es una propuesta documental basada en el dominio.
  No corresponde a un endpoint implementado validado.
method: PUT
url: '{{base_url}}{{api_prefix}}{{api_version}}/citas/{{cita_id}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{auth_token}}'
body:
  type: json
  content: |-
    {
      "fecha": "2026-01-15T11:00:00Z",
      "estado": "confirmada"
    }
