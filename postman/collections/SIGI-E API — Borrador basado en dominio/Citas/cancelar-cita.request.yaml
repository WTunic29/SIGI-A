$kind: http-request
name: 'Cancelar cita'
description: |-
  Placeholder de borrador para cancelar una cita existente.

  Se define como una posible operación del dominio de agenda y no como endpoint implementado confirmado.
method: PATCH
url: '{{base_url}}{{api_prefix}}{{api_version}}/citas/{{cita_id}}/cancelacion'
order: 5000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{auth_token}}'
body:
  type: json
  content: |-
    {
      "estado": "cancelada"
    }
