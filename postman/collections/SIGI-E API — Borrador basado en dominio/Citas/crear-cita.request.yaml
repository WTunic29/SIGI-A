$kind: http-request
name: 'Crear cita'
description: |-
  Placeholder de borrador para agendar una cita entre usuario, empleado y servicio.

  El request refleja la relación observada en el esquema entre citas, usuarios, empleados y servicios.
  No representa un endpoint implementado verificado.
method: POST
url: '{{base_url}}{{api_prefix}}{{api_version}}/citas'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{auth_token}}'
body:
  type: json
  content: |-
    {
      "usuario_id": "{{usuario_id}}",
      "empleado_id": "{{empleado_id}}",
      "servicio_id": "{{servicio_id}}",
      "fecha": "2026-01-15T10:00:00Z",
      "estado": "pendiente"
    }
