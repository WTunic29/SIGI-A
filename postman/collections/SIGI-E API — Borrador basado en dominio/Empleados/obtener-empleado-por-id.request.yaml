$kind: http-request
name: 'Obtener empleado por ID'
description: |-
  Placeholder de borrador para consultar el detalle de un empleado específico.

  Basado en la entidad empleados y su asociación con negocios.
  No es un endpoint implementado verificado.
method: GET
url: '{{base_url}}{{api_prefix}}{{api_version}}/empleados/{{empleado_id}}'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
