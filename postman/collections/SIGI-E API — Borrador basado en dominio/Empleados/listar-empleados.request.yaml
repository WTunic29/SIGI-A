$kind: http-request
name: 'Listar empleados'
description: |-
  Placeholder de borrador para obtener empleados asociados a un negocio.

  Este request se apoya en la relación entre negocios y empleados presente en el esquema.
  No corresponde a un endpoint implementado ni verificado.
method: GET
url: '{{base_url}}{{api_prefix}}{{api_version}}/negocios/{{negocio_id}}/empleados'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
