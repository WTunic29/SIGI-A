$kind: http-request
name: 'Registrar usuario'
description: |-
  Placeholder de borrador para registro de usuarios dentro del dominio SIGI-E.

  Se incluye como propuesta funcional de autenticación y acceso.
  No representa un endpoint implementado ni verificado.
method: POST
url: '{{base_url}}{{api_prefix}}{{api_version}}/auth/register'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nombre": "Usuario de prueba",
      "email": "{{email_prueba}}",
      "password": "{{password_prueba}}",
      "rol": "{{rol_usuario}}"
    }
