$kind: http-request
name: Pedidos del Usuario
description: Obtiene todos los pedidos asociados a un usuario específico. Requiere autenticación JWT.
method: GET
url: '{{base_url}}/usuarios/{{id_usuario}}/pedidos'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Pedidos obtenidos", () => pm.response.to.have.status(200));
      pm.test("Respuesta es un array", () => pm.expect(pm.response.json()).to.be.an("array"));
      const pedidos = pm.response.json();
      if (pedidos.length > 0) {
        const p = pedidos[0];
        pm.test("Pedido tiene id", () => pm.expect(p).to.have.property("id"));
        pm.test("Pedido tiene id_usuario", () => pm.expect(p).to.have.property("id_usuario"));
        pm.test("Pedido tiene id_negocio", () => pm.expect(p).to.have.property("id_negocio"));
        pm.test("total es mayor o igual a 0", () => pm.expect(p.total).to.be.at.least(0));
        pm.test("Estado es válido", () => pm.expect(p.estado).to.be.oneOf(["pendiente", "pagado", "cancelado", "entregado"]));
      }