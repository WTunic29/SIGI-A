$kind: http-request
name: Crear Producto
description: Crea un nuevo producto para un negocio. precio y stock deben ser mayores o iguales a 0. Estado activo o inactivo. Requiere autenticación JWT.
method: POST
url: '{{base_url}}/productos'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "id_negocio": {{id_negocio}},
      "nombre": "Shampoo Profesional",
      "descripcion": "Shampoo para cabello dañado 500ml",
      "precio": 28000.00,
      "stock": 50,
      "estado": "activo"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 201 - Producto creado", () => pm.response.to.have.status(201));
      pm.test("Respuesta tiene campo producto", () => pm.expect(pm.response.json()).to.have.property("producto"));
      const producto = pm.response.json().producto;
      if (producto) {
        pm.test("Producto tiene id", () => pm.expect(producto).to.have.property("id"));
        pm.test("Producto tiene nombre", () => pm.expect(producto).to.have.property("nombre"));
        pm.test("Producto tiene id_negocio", () => pm.expect(producto).to.have.property("id_negocio"));
        pm.test("precio es mayor o igual a 0", () => pm.expect(producto.precio).to.be.at.least(0));
        pm.test("stock es mayor o igual a 0", () => pm.expect(producto.stock).to.be.at.least(0));
        pm.test("Estado es válido", () => pm.expect(producto.estado).to.be.oneOf(["activo", "inactivo"]));
        pm.environment.set("id_producto", producto.id);
      }