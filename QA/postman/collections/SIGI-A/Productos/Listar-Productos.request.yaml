$kind: http-request
name: Listar Productos del Negocio
description: Obtiene todos los productos de un negocio específico. Requiere autenticación JWT.
method: GET
url: '{{base_url}}/negocios/{{id_negocio}}/productos'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Lista obtenida", () => pm.response.to.have.status(200));
      pm.test("Respuesta es un array", () => pm.expect(pm.response.json()).to.be.an("array"));
      const productos = pm.response.json();
      if (productos.length > 0) {
        const p = productos[0];
        pm.test("Producto tiene id", () => pm.expect(p).to.have.property("id"));
        pm.test("Producto tiene nombre", () => pm.expect(p).to.have.property("nombre"));
        pm.test("Producto tiene id_negocio", () => pm.expect(p).to.have.property("id_negocio"));
        pm.test("precio es mayor o igual a 0", () => pm.expect(p.precio).to.be.at.least(0));
        pm.test("stock es mayor o igual a 0", () => pm.expect(p.stock).to.be.at.least(0));
        pm.test("Estado es válido", () => pm.expect(p.estado).to.be.oneOf(["activo", "inactivo"]));
      }