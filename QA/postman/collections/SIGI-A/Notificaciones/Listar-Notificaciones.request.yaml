$kind: http-request
name: Listar Notificaciones
description: 'Obtiene todas las notificaciones de un usuario. Tipos válidos: cita, pago, pedido, sistema, promocion. Requiere autenticación JWT.'
method: GET
url: '{{base_url}}/usuarios/{{id_usuario}}/notificaciones'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Notificaciones obtenidas", () => pm.response.to.have.status(200));
      pm.test("Respuesta es un array", () => pm.expect(pm.response.json()).to.be.an("array"));
      const notificaciones = pm.response.json();
      if (notificaciones.length > 0) {
        const n = notificaciones[0];
        pm.test("Notificacion tiene id", () => pm.expect(n).to.have.property("id"));
        pm.test("Notificacion tiene id_usuario", () => pm.expect(n).to.have.property("id_usuario"));
        pm.test("Notificacion tiene titulo", () => pm.expect(n).to.have.property("titulo"));
        pm.test("Notificacion tiene mensaje", () => pm.expect(n).to.have.property("mensaje"));
        pm.test("tipo es válido", () => pm.expect(n.tipo).to.be.oneOf(["cita", "pago", "pedido", "sistema", "promocion"]));
        pm.test("leida es booleano", () => pm.expect(n.leida).to.be.a("boolean"));
      }