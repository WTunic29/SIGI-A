$kind: http-request
name: Crear Calificacion
description: Crea una calificacion para un negocio. puntuacion debe estar entre 1 y 5. id_cita es opcional. Requiere autenticación JWT.
method: POST
url: '{{base_url}}/calificaciones'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "id_cliente": {{id_usuario}},
      "id_negocio": {{id_negocio}},
      "id_cita": {{id_cita}},
      "puntuacion": 5,
      "comentario": "Excelente servicio, muy profesionales."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 201 - Calificacion creada", () => pm.response.to.have.status(201));
      pm.test("Respuesta tiene campo calificacion", () => pm.expect(pm.response.json()).to.have.property("calificacion"));
      const cal = pm.response.json().calificacion;
      if (cal) {
        pm.test("Calificacion tiene id", () => pm.expect(cal).to.have.property("id"));
        pm.test("Calificacion tiene id_cliente", () => pm.expect(cal).to.have.property("id_cliente"));
        pm.test("Calificacion tiene id_negocio", () => pm.expect(cal).to.have.property("id_negocio"));
        pm.test("puntuacion está entre 1 y 5", () => {
          pm.expect(cal.puntuacion).to.be.at.least(1);
          pm.expect(cal.puntuacion).to.be.at.most(5);
        });
        pm.environment.set("id_calificacion", cal.id);
      }